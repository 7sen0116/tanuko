[[models]]
# モデル名（name = "tanuko_AR"

# ビルボーディング表示設定（カメラの方向を向くか）
billboarding = true

# 非モーション再生時の呼吸動作設定
enablebreathing = true

# AR空間上のモデルの拡大率
scale = 1

# AR空間上のモデルの表示位置
[models.position]
x = 0
y = 0
z = 0

# AR空間上のモデルの表示角度調整
[models.rotation]
x = 0
y = 0
z = 0

# AR空間上のモデルのオフセット
[models.canvasOffset]
x = 0
y = 0

# 全体の設定
[global]
# マーカーARモードとツーショットARモードの切替の許可設定
allowModeSwitch = true

# 起動時のモード設定
startupMode = 0